<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Webhook</title>
    <link rel="stylesheet" href="/api/plugins/ui.css" />
  </head>
  <body class="dibao-plugin">
    <main class="shell">
      <header class="toolbar">
        <div>
          <h1>Webhook</h1>
          <div class="muted" id="summary">加载中</div>
        </div>
        <button class="button primary" id="new-rule" type="button">新建规则</button>
      </header>

      <div id="error" class="error" hidden></div>

      <section class="layout">
        <aside class="panel">
          <h2>规则</h2>
          <div id="rules" class="rule-list"></div>
        </aside>

        <section class="panel" id="editor">
          <h2>规则设置</h2>
          <div id="empty" class="empty">还没有规则。</div>
          <form id="form" hidden>
            <div class="grid">
              <label>名称<input id="name" /></label>
              <label>事件<select id="event"></select></label>
              <label>方法<select id="method"><option>POST</option><option>GET</option></select></label>
              <label>URL 模板<input id="url" placeholder="https://example.com/hook/{{event.articleId}}" /></label>
            </div>
            <div class="checks">
              <label class="check"><input id="enabled" type="checkbox" />启用</label>
              <label class="check"><input id="include-content" type="checkbox" />发送全文</label>
            </div>

            <h2>条件</h2>
            <div id="conditions" class="conditions"></div>
            <div class="actions">
              <button class="button" id="add-condition" type="button">添加条件</button>
            </div>

            <h2>请求</h2>
            <div class="grid">
              <label>静态 Headers<textarea id="headers"></textarea></label>
              <label>Secret Headers<textarea id="secret-headers"></textarea></label>
              <label id="query-wrap">GET Query 模板<textarea id="query"></textarea></label>
              <label id="body-wrap">POST Body 模板<textarea id="body"></textarea></label>
            </div>

            <h2>Secret</h2>
            <div class="grid">
              <label>Key<input id="secret-key" placeholder="webhook.token" /></label>
              <label>Hint<input id="secret-hint" placeholder="tok_..." /></label>
              <label>Value<input id="secret-value" type="password" /></label>
            </div>

            <div class="actions">
              <button class="button primary" id="save" type="submit">保存</button>
              <button class="button" id="test" type="button">测试发送</button>
              <button class="button" id="save-secret" type="button">保存 Secret</button>
              <button class="button danger" id="delete" type="button">删除规则</button>
            </div>
          </form>
        </section>
      </section>

      <section class="panel">
        <h2>投递记录</h2>
        <div id="deliveries" class="delivery-list"></div>
      </section>
    </main>

    <script>
      const pluginId = "app.dibao.webhook";
      const state = {
        rules: [],
        secrets: [],
        deliveries: [],
        events: [],
        selectedId: null
      };

      const defaults = {
        headers: { "x-dibao-plugin": "webhook" },
        secretHeaders: {},
        queryTemplate: { event: "{{eventName}}", articleId: "{{event.articleId}}" },
        bodyTemplate: {
          eventName: "{{eventName}}",
          event: "{{event}}",
          article: "{{article}}",
          generatedAt: "{{generatedAt}}",
          ruleId: "{{ruleId}}"
        }
      };

      const api = async (path, options = {}) => {
        const response = await fetch(`/api/plugins/${pluginId}/api/${path}`, {
          credentials: "same-origin",
          headers: { "content-type": "application/json" },
          ...options
        });
        const body = await response.json();
        if (!response.ok) {
          throw new Error(body.error?.message || "Plugin request failed");
        }
        return body.data;
      };

      document.getElementById("new-rule").addEventListener("click", () => {
        const rule = newRule();
        state.rules = [rule, ...state.rules];
        state.selectedId = rule.id;
        render();
      });

      document.getElementById("method").addEventListener("change", renderMethod);
      document.getElementById("add-condition").addEventListener("click", () => {
        const rule = currentRule();
        if (!rule) return;
        rule.conditions.push({ path: "event.articleId", operator: "exists", value: "" });
        renderForm(rule);
      });

      document.getElementById("form").addEventListener("submit", async (event) => {
        event.preventDefault();
        await run(async () => {
          const rule = readForm();
          const path = rule.id.startsWith("draft_") ? "rules" : `rules/${encodeURIComponent(rule.id)}`;
          const result = await api(path, { method: "POST", body: JSON.stringify(rule) });
          applyState(result);
        });
      });

      document.getElementById("test").addEventListener("click", async () => {
        const rule = readForm();
        await run(async () => {
          if (rule.id.startsWith("draft_")) {
            const saved = await api("rules", { method: "POST", body: JSON.stringify(rule) });
            applyState(saved);
          } else {
            const result = await api(`rules/${encodeURIComponent(rule.id)}/test`, {
              method: "POST",
              body: JSON.stringify({})
            });
            applyState(result.state);
          }
        });
      });

      document.getElementById("delete").addEventListener("click", async () => {
        const rule = currentRule();
        if (!rule) return;
        await run(async () => {
          if (!rule.id.startsWith("draft_")) {
            const result = await api(`rules/${encodeURIComponent(rule.id)}/delete`, { method: "POST", body: "{}" });
            applyState(result);
          } else {
            state.rules = state.rules.filter((candidate) => candidate.id !== rule.id);
            state.selectedId = state.rules[0]?.id || null;
            render();
          }
        });
      });

      document.getElementById("save-secret").addEventListener("click", async () => {
        const key = document.getElementById("secret-key").value.trim();
        const value = document.getElementById("secret-value").value;
        const hint = document.getElementById("secret-hint").value.trim();
        if (!key || !value) {
          showError("Secret key 和 value 不能为空。");
          return;
        }
        await run(async () => {
          const result = await api(`secrets/${encodeURIComponent(key)}`, {
            method: "POST",
            body: JSON.stringify({ value, hint })
          });
          applyState(result.state);
          document.getElementById("secret-value").value = "";
        });
      });

      load();

      async function load() {
        await run(async () => applyState(await api("state")));
      }

      function applyState(next) {
        state.rules = next.rules || [];
        state.secrets = next.secrets || [];
        state.deliveries = next.deliveries || [];
        state.events = next.events || [];
        if (!state.rules.some((rule) => rule.id === state.selectedId)) {
          state.selectedId = state.rules[0]?.id || null;
        }
        render();
      }

      async function run(fn) {
        try {
          await fn();
          showError(null);
        } catch (error) {
          showError(error.message);
        }
      }

      function render() {
        document.getElementById("summary").textContent =
          `${state.rules.length} 条规则，${state.deliveries.length} 条最近投递`;
        renderRules();
        renderEvents();
        const rule = currentRule();
        document.getElementById("empty").hidden = Boolean(rule);
        document.getElementById("form").hidden = !rule;
        if (rule) renderForm(rule);
        renderDeliveries();
      }

      function renderRules() {
        const root = document.getElementById("rules");
        root.innerHTML = "";
        if (state.rules.length === 0) {
          root.innerHTML = '<div class="empty">无规则</div>';
          return;
        }
        for (const rule of state.rules) {
          const button = document.createElement("button");
          button.type = "button";
          button.className = `rule-row${rule.id === state.selectedId ? " active" : ""}`;
          button.innerHTML = `<strong>${escapeHtml(rule.name)}</strong><div class="muted">${escapeHtml(rule.eventName)} · ${rule.method} · ${rule.enabled ? "启用" : "停用"}</div>`;
          button.addEventListener("click", () => {
            saveDraftFromForm();
            state.selectedId = rule.id;
            render();
          });
          root.append(button);
        }
      }

      function renderEvents() {
        const select = document.getElementById("event");
        const selected = select.value;
        select.innerHTML = "";
        for (const eventName of state.events) {
          const option = document.createElement("option");
          option.value = eventName;
          option.textContent = eventName;
          select.append(option);
        }
        if (selected) select.value = selected;
      }

      function renderForm(rule) {
        document.getElementById("name").value = rule.name || "";
        document.getElementById("event").value = rule.eventName;
        document.getElementById("method").value = rule.method || "POST";
        document.getElementById("url").value = rule.urlTemplate || "";
        document.getElementById("enabled").checked = rule.enabled !== false;
        document.getElementById("include-content").checked = rule.includeContent === true;
        document.getElementById("headers").value = formatJson(rule.headers || {});
        document.getElementById("secret-headers").value = formatJson(rule.secretHeaders || {});
        document.getElementById("query").value = formatJson(rule.queryTemplate || {});
        document.getElementById("body").value = formatJson(rule.bodyTemplate || {});
        renderConditions(rule);
        renderMethod();
      }

      function renderMethod() {
        const method = document.getElementById("method").value;
        document.getElementById("query-wrap").hidden = method !== "GET";
        document.getElementById("body-wrap").hidden = method !== "POST";
      }

      function renderConditions(rule) {
        const root = document.getElementById("conditions");
        root.innerHTML = "";
        for (const [index, condition] of (rule.conditions || []).entries()) {
          const row = document.createElement("div");
          row.className = "condition";
          row.innerHTML = `
            <input data-cond="${index}" data-field="path" value="${escapeAttr(condition.path || "")}" />
            <select data-cond="${index}" data-field="operator">
              <option value="exists">exists</option>
              <option value="equals">equals</option>
              <option value="contains">contains</option>
            </select>
            <input data-cond="${index}" data-field="value" value="${escapeAttr(condition.value || "")}" />
            <button class="button danger" data-remove="${index}" type="button">删除</button>
          `;
          row.querySelector("select").value = condition.operator || "exists";
          row.addEventListener("input", () => {
            const live = currentRule();
            if (!live) return;
            live.conditions = readConditions();
          });
          row.querySelector("[data-remove]").addEventListener("click", () => {
            const live = currentRule();
            if (!live) return;
            live.conditions.splice(index, 1);
            renderForm(live);
          });
          root.append(row);
        }
        if (!rule.conditions?.length) {
          root.innerHTML = '<div class="empty">无条件</div>';
        }
      }

      function renderDeliveries() {
        const root = document.getElementById("deliveries");
        root.innerHTML = "";
        if (state.deliveries.length === 0) {
          root.innerHTML = '<div class="empty">无投递记录</div>';
          return;
        }
        for (const delivery of state.deliveries.slice(0, 20)) {
          const row = document.createElement("div");
          row.className = "delivery-row";
          row.innerHTML = `
            <div><span class="pill">${escapeHtml(delivery.status)}</span> ${escapeHtml(delivery.method)} ${escapeHtml(delivery.url)}</div>
            <div class="muted">${escapeHtml(delivery.error || "")} ${escapeHtml(delivery.finishedAt || delivery.updatedAt || delivery.createdAt || "")}</div>
          `;
          root.append(row);
        }
      }

      function readForm() {
        const existing = currentRule() || newRule();
        return {
          ...existing,
          name: document.getElementById("name").value.trim(),
          eventName: document.getElementById("event").value,
          method: document.getElementById("method").value,
          urlTemplate: document.getElementById("url").value.trim(),
          enabled: document.getElementById("enabled").checked,
          includeContent: document.getElementById("include-content").checked,
          conditions: readConditions(),
          headers: parseJson("headers"),
          secretHeaders: parseJson("secret-headers"),
          queryTemplate: parseJson("query"),
          bodyTemplate: parseJson("body")
        };
      }

      function readConditions() {
        const rows = [...document.querySelectorAll("[data-cond][data-field='path']")];
        return rows.map((pathInput) => {
          const index = pathInput.dataset.cond;
          return {
            path: pathInput.value.trim(),
            operator: document.querySelector(`[data-cond="${index}"][data-field="operator"]`).value,
            value: document.querySelector(`[data-cond="${index}"][data-field="value"]`).value
          };
        }).filter((condition) => condition.path);
      }

      function saveDraftFromForm() {
        const rule = currentRule();
        if (rule && rule.id.startsWith("draft_") && !document.getElementById("form").hidden) {
          Object.assign(rule, readForm());
        }
      }

      function currentRule() {
        return state.rules.find((rule) => rule.id === state.selectedId) || null;
      }

      function newRule() {
        const eventName = state.events[0] || "article.created";
        return {
          id: `draft_${Date.now()}`,
          name: "新规则",
          enabled: true,
          eventName,
          conditions: [],
          method: "POST",
          urlTemplate: "",
          includeContent: false,
          ...structuredClone(defaults)
        };
      }

      function parseJson(id) {
        const text = document.getElementById(id).value.trim();
        if (!text) return {};
        return JSON.parse(text);
      }

      function formatJson(value) {
        return JSON.stringify(value || {}, null, 2);
      }

      function showError(message) {
        const node = document.getElementById("error");
        node.hidden = !message;
        node.textContent = message || "";
      }

      function escapeHtml(value) {
        return String(value ?? "").replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;"
        })[char]);
      }

      function escapeAttr(value) {
        return escapeHtml(value);
      }
    </script>
  </body>
</html>
