name: Bug report / 缺陷反馈
description: Report something that is not working / 反馈无法正常工作的行为
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Clear reproduction steps help us fix it faster.

        感谢你反馈缺陷。清晰的复现步骤能帮助我们更快定位问题。
  - type: textarea
    id: summary
    attributes:
      label: Summary / 摘要
      description: What went wrong? / 出现了什么问题？
      placeholder: |
        English: The app crashes when...
        中文：当……时，应用会……
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce / 复现步骤
      description: List the exact steps to reproduce the problem. / 请列出复现问题的具体步骤。
      placeholder: |
        1. Go to...
        2. Click...
        3. See...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior / 预期行为
      description: What did you expect to happen? / 你原本预期会发生什么？
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior / 实际行为
      description: What actually happened? / 实际发生了什么？
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment / 环境
      description: Browser, device, OS, deployment mode, or version. / 浏览器、设备、系统、部署方式或版本。
      placeholder: |
        Browser:
        Device:
        OS:
        Version or commit:
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots / 日志或截图
      description: Paste logs, screenshots, or screen recordings if available. / 如有日志、截图或录屏，请粘贴。
      render: shell
