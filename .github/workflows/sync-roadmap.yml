name: Sync roadmap

on:
  issues:
    types:
      - opened
      - edited
      - reopened
      - closed
      - labeled
      - unlabeled
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: read
  issues: read

concurrency:
  group: roadmap-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      ROADMAP_PROJECT_OWNER: Pls-1q43
      ROADMAP_PROJECT_NUMBER: "1"
      ROADMAP_REPOSITORY: Pls-1q43/Dibao
      FEATURE_REQUEST_LABEL: enhancement
      VOTES_FIELD: Votes
      STATUS_FIELD: Status
      PLANNED_STATUS: Planned (soon)
      DONE_STATUS: Done
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Sync feature requests
        run: node .github/scripts/sync-roadmap.mjs
        env:
          GH_TOKEN: ${{ secrets.ROADMAP_PROJECT_TOKEN }}
