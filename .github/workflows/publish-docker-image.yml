name: Publish Docker Image

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build, such as v0.2.0 or main"
        required: true
        default: "main"
      image_tag:
        description: "Image tag to publish, such as v0.2.0-test"
        required: true
        default: "manual"
      publish_moving_aliases:
        description: "Also publish stable and latest"
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    name: Build and push Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Compute image name
        id: image
        shell: bash
        run: |
          echo "name=${REGISTRY}/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare private Sentry config
        shell: bash
        env:
          DIBAO_SENTRY_CONFIG_JSON: ${{ secrets.DIBAO_SENTRY_CONFIG_JSON }}
        run: |
          if [ -z "$DIBAO_SENTRY_CONFIG_JSON" ]; then
            echo "::error::DIBAO_SENTRY_CONFIG_JSON is required for release Docker images."
            exit 1
          fi

          sentry_config="${RUNNER_TEMP}/dibao-sentry.json"
          printf '%s' "$DIBAO_SENTRY_CONFIG_JSON" > "$sentry_config"
          chmod 600 "$sentry_config"

          node - "$sentry_config" <<'NODE'
          const fs = require("node:fs");
          const path = process.argv[2];
          const config = JSON.parse(fs.readFileSync(path, "utf8"));
          const missing = ["dsn", "org", "project"].filter((key) => !String(config[key] ?? "").trim());
          if (missing.length > 0) {
            console.error(`DIBAO_SENTRY_CONFIG_JSON is missing required key(s): ${missing.join(", ")}`);
            process.exit(1);
          }
          console.log("Sentry config check:", {
            hasDsn: Boolean(config.dsn),
            hasOrg: Boolean(config.org),
            hasProject: Boolean(config.project)
          });
          NODE

          echo "DIBAO_SENTRY_CONFIG_FILE=$sentry_config" >> "$GITHUB_ENV"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=tag
            type=raw,value=${{ inputs.image_tag || 'manual' }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=stable,enable=${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-')) || (github.event_name == 'workflow_dispatch' && inputs.publish_moving_aliases) }}
            type=raw,value=latest,enable=${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-')) || (github.event_name == 'workflow_dispatch' && inputs.publish_moving_aliases) }}
          labels: |
            org.opencontainers.image.title=Dibao
            org.opencontainers.image.description=Self-hosted single-user personalized RSS reader

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          secret-files: |
            dibao_sentry_config=${{ env.DIBAO_SENTRY_CONFIG_FILE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
