name: dibao

services:
  dibao:
    build:
      context: .
    image: dibao:local
    restart: unless-stopped
    ports:
      - "${DIBAO_HOST_PORT:-8080}:8080"
    environment:
      DIBAO_HOST: 0.0.0.0
      DIBAO_PORT: "8080"
      DIBAO_DATABASE_PATH: /data/dibao.sqlite
      DIBAO_COOKIE_SECURE: "false"
    volumes:
      - ./data:/data
